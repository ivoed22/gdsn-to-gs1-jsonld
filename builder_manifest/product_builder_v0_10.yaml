manifest_version: "0.10.0"
title: Manual JSON-LD Product Builder
description: >
  UI configuration for manually authoring prototype GS1 Web Vocabulary JSON-LD.
  This is not converter mapping logic and must not be used to generate or
  update mapping YAML.
root_classes:
  - key: Product
    label: Product
    webvoc_id: gs1:Product
    supported_in_v0_10: true
default_language_options:
  - en
  - nl
  - de
  - fr
product_categories:
  - key: general_product
    label: General Product
    groups:
      - core_product_information
      - classification_links
      - physical_dimensions
      - product_descriptions
      - consumer_information
      - dates_lifecycle
      - digital_links_services
      - consumer_dpp_links
      - other_webvoc_properties
  - key: food_beverage_tobacco
    label: Food / Beverage / Tobacco
    groups:
      - core_product_information
      - classification_links
      - physical_dimensions
      - product_descriptions
      - consumer_information
      - dates_lifecycle
      - nutritional_information
      - nutrition
      - food_coding
      - allergens
      - digital_links_services
      - consumer_dpp_links
  - key: packaging
    label: Packaging
    groups:
      - core_product_information
      - physical_dimensions
      - packaging_details
      - digital_links_services
  - key: certifications_documents
    label: Certifications & Documents
    groups:
      - core_product_information
      - certifications
      - documents_dpp
      - digital_links_services
groups:
  - key: core_product_information
    label: Core Product Information
    description: >
      Product identity and consumer-facing description fields that can be
      authored as simple values without nested object modelling.
    properties:
      - property_id: gs1:gtin
        requirement: required
        input_type_override: text
        example_value: "09501234567890"
        help_text: GTIN is used to create the product @id.
        appears_because: Core GS1 product identity and Digital Link-style identifier.
        supported_in_v0_10: true
      - property_id: gs1:productID
        requirement: optional
        example_value: "SKU-12345"
        help_text: Additional product identifier when a local product ID is useful.
        appears_because: WebVoc provides a string identifier beside GTIN.
        supported_in_v0_10: true
      - property_id: gs1:productName
        requirement: required
        input_type_override: language_text
        example_value: "Example apple juice"
        help_text: Consumer-friendly product name with a language tag.
        appears_because: Common visible product label text in Web Vocabulary.
        supported_in_v0_10: true
      - property_id: gs1:additionalProductDescription
        requirement: optional
        input_type_override: language_text
        example_value: "Apple juice from concentrate, 1 L carton"
        help_text: Extra consumer/product description with a language tag.
        appears_because: Useful manual description field with a simple langString range.
        supported_in_v0_10: true
      - property_id: gs1:brand
        requirement: recommended
        input_type_override: object
        object_type: gs1:Brand
        help_text: "Brand as a nested gs1:Brand object with a language-tagged brand name."
        appears_because: "Brand is modelled as a nested gs1:Brand object in the Web Vocabulary."
        supported_in_v0_10: true
        object_fields:
          - property_id: gs1:brandName
            requirement: recommended
            input_type_override: language_text
            example_value: "Example Brand"
            help_text: "Brand name (language-tagged)."
          - property_id: gs1:subBrandName
            requirement: optional
            input_type_override: language_text
            example_value: "Example Sub-brand"
            help_text: "Sub-brand name (language-tagged)."
      - property_id: gs1:colourDescription
        requirement: optional
        input_type_override: language_text
        example_value: "Red"
        help_text: Optional colour description with a language tag.
        appears_because: Simple product-level langString field available in WebVoc.
        supported_in_v0_10: true
      - property_id: gs1:image
        requirement: recommended
        input_type_override: object
        object_type: gs1:ReferencedFileDetails
        help_text: "Product image as a nested gs1:ReferencedFileDetails object (file URL plus optional pixel size)."
        appears_because: "Images are modelled as gs1:ReferencedFileDetails in the Web Vocabulary."
        supported_in_v0_10: true
        object_fields:
          - property_id: gs1:referencedFileURL
            requirement: recommended
            input_type_override: url
            example_value: "https://example.com/product-image.jpg"
            help_text: "Direct URL of the image file."
          - property_id: gs1:filePixelWidth
            requirement: optional
            input_type_override: integer
            example_value: "800"
            help_text: "Image width in pixels."
          - property_id: gs1:filePixelHeight
            requirement: optional
            input_type_override: integer
            example_value: "600"
            help_text: "Image height in pixels."
          - property_id: gs1:fileLanguageCode
            requirement: optional
            input_type_override: text
            example_value: "en"
            help_text: "Language code of the file content."
      - property_id: gs1:relatedImage
        requirement: optional
        input_type_override: url
        example_value: "https://example.com/product-image.jpg"
        help_text: Direct URL link-type for a related product image.
        appears_because: Available link-type field for lightweight image URL prototypes.
        supported_in_v0_10: true
      - property_id: gs1:pip
        requirement: optional
        input_type_override: url
        example_value: "https://example.com/products/09501234567890"
        help_text: Product information page URL.
        appears_because: Available WebVoc link type for product pages.
        supported_in_v0_10: true

  - key: classification_links
    label: Classification & Links
    description: >
      Category codes and authoritative product links useful for discovery and
      review.
    properties:
      - property_id: gs1:gpcCategoryCode
        requirement: recommended
        example_value: "10000237"
        help_text: 8-digit GPC brick code.
        appears_because: Common GS1 classification evidence.
        supported_in_v0_10: true
      - property_id: gs1:gpcCategoryDescription
        requirement: optional
        input_type_override: language_text
        example_value: "Fruit and vegetable juices"
        help_text: Human-readable GPC category description.
        appears_because: Simple language-tagged category description.
        supported_in_v0_10: true
      - property_id: gs1:masterData
        requirement: optional
        input_type_override: url
        example_value: "https://example.com/master-data/09501234567890"
        help_text: Link to master data for the product.
        appears_because: Available link-type field for product master-data references.
        supported_in_v0_10: true

  - key: physical_dimensions
    label: Physical Dimensions
    description: >
      Simple quantitative values represented as value plus unitCode.
    properties:
      - property_id: gs1:netContent
        requirement: recommended
        input_type_override: quantity
        example_value: "1 LTR"
        help_text: Enter numeric value and UN/ECE-style unit code.
        appears_because: Common product quantity field with QuantitativeValue range.
        supported_in_v0_10: true
      - property_id: gs1:grossWeight
        requirement: optional
        input_type_override: quantity
        example_value: "1.08 KGM"
        help_text: Gross weight including packaging.
        appears_because: QuantitativeValue range can be represented safely.
        supported_in_v0_10: true
      - property_id: gs1:inPackageHeight
        requirement: optional
        input_type_override: quantity
        example_value: "24 CMT"
        help_text: Height while product is in package.
        appears_because: WebVoc provides in-package dimensions with QuantitativeValue range.
        supported_in_v0_10: true
      - property_id: gs1:inPackageWidth
        requirement: optional
        input_type_override: quantity
        example_value: "8 CMT"
        help_text: Width while product is in package.
        appears_because: WebVoc provides in-package dimensions with QuantitativeValue range.
        supported_in_v0_10: true
      - property_id: gs1:inPackageDepth
        requirement: optional
        input_type_override: quantity
        example_value: "8 CMT"
        help_text: Depth while product is in package.
        appears_because: WebVoc provides in-package dimensions with QuantitativeValue range.
        supported_in_v0_10: true

  - key: digital_links_services
    label: Digital Links & Services
    description: Link-type properties that can safely emit direct HTTP(S) URLs.
    properties:
      - property_id: gs1:defaultLink
        requirement: optional
        input_type_override: url
        example_value: "https://example.com/01/09501234567890"
        help_text: Default link for product resolver experiences.
        appears_because: Common Digital Link resolver target.
        supported_in_v0_10: true
      - property_id: gs1:smartLabel
        requirement: optional
        input_type_override: url
        example_value: "https://example.com/smartlabel/09501234567890"
        help_text: SmartLabel information URL.
        appears_because: Available consumer-information link type.
        supported_in_v0_10: true
      - property_id: gs1:traceability
        requirement: optional
        input_type_override: url
        example_value: "https://example.com/trace/09501234567890"
        help_text: Traceability information URL.
        appears_because: Useful lightweight provenance link.
        supported_in_v0_10: true

  - key: packaging_details
    label: Packaging Details
    description: >
      Packaging information where v0.10 can show safe URL or simple code
      fields; nested packaging structures remain planned.
    properties:
      - property_id: gs1:packagingMarkedLabelAccreditation
        requirement: optional
        example_value: "RECYCLABLE"
        help_text: Accreditation code is a controlled-code object in WebVoc.
        appears_because: Included as a visible packaging review topic.
        supported_in_v0_10: false
        planned_reason: Requires controlled-code handling before emission.
      - property_id: gs1:packagingMaterial
        requirement: optional
        input_type_override: object
        object_type: gs1:PackagingMaterial
        help_text: "Packaging material as a nested gs1:PackagingMaterial object (safe quantity sub-fields)."
        appears_because: "Packaging material is modelled as gs1:PackagingMaterial in the Web Vocabulary."
        supported_in_v0_10: true
        object_fields:
          - property_id: gs1:packagingMaterialCompositionQuantity
            requirement: optional
            input_type_override: quantity
            example_value: "20 GRM"
            help_text: "Quantity of this material (value + unitCode)."
          - property_id: gs1:packagingMaterialThickness
            requirement: optional
            input_type_override: quantity
            example_value: "0.2 MMT"
            help_text: "Material thickness (value + unitCode)."
      - property_id: gs1:sustainabilityInfo
        requirement: optional
        input_type_override: url
        example_value: "https://example.com/sustainability/09501234567890"
        help_text: Sustainability and recycling information URL.
        appears_because: Available link type for packaging/sustainability references.
        supported_in_v0_10: true

  - key: nutritional_information
    label: Nutritional Information
    description: >
      v0.10 supports lightweight nutrition information links and plain
      ingredient text; structured nutrient details remain planned.
    properties:
      - property_id: gs1:ingredientStatement
        requirement: recommended
        input_type_override: language_text
        example_value: "Apple juice from concentrate."
        help_text: Ingredient statement with a language tag.
        appears_because: Safe Food/Beverage langString field.
        supported_in_v0_10: true
      - property_id: gs1:nutritionalInfo
        requirement: optional
        input_type_override: url
        example_value: "https://example.com/nutrition/09501234567890"
        help_text: Nutrition information URL.
        appears_because: Available link type for nutrition information.
        supported_in_v0_10: true
      - property_id: gs1:nutrientDetail
        requirement: optional
        example_value: "Energy 190 KJ"
        help_text: Structured nutrient detail is not present as a simple WebVoc term.
        appears_because: Existing mapping review tracks nutrient modelling.
        supported_in_v0_10: false
        planned_reason: Requires governed nested nutrient modelling.

  - key: allergens
    label: Allergens
    description: Text and link fields for allergen review; structured details remain planned.
    properties:
      - property_id: gs1:allergenStatement
        requirement: recommended
        input_type_override: language_text
        example_value: "Contains almonds."
        help_text: Textual allergen statement with a language tag.
        appears_because: Safe Food/Beverage langString field.
        supported_in_v0_10: true
      - property_id: gs1:allergenInfo
        requirement: optional
        input_type_override: url
        example_value: "https://example.com/allergens/09501234567890"
        help_text: Allergen information URL.
        appears_because: Available link type for allergen information.
        supported_in_v0_10: true
      - property_id: gs1:hasAllergen
        requirement: optional
        input_type_override: object
        object_type: gs1:AllergenDetails
        help_text: "Allergen as a nested gs1:AllergenDetails object: pick an allergen type and a containment level from the GS1 code lists."
        appears_because: "Allergens are modelled as gs1:AllergenDetails with controlled code values in the Web Vocabulary."
        supported_in_v0_10: true
        object_fields:
          - property_id: gs1:allergenType
            requirement: recommended
            input_type_override: code
            help_text: "Allergen type (GS1 AllergenTypeCode; EU-14 subset)."
            options:
              - {value: "gs1:AllergenTypeCode-CEREALS_CONTAINING_GLUTEN", label: "Cereals containing gluten"}
              - {value: "gs1:AllergenTypeCode-AC", label: "Crustaceans"}
              - {value: "gs1:AllergenTypeCode-AE", label: "Eggs"}
              - {value: "gs1:AllergenTypeCode-AF", label: "Fish"}
              - {value: "gs1:AllergenTypeCode-AP", label: "Peanuts"}
              - {value: "gs1:AllergenTypeCode-AY", label: "Soybeans"}
              - {value: "gs1:AllergenTypeCode-AM", label: "Milk"}
              - {value: "gs1:AllergenTypeCode-AN", label: "Tree nuts"}
              - {value: "gs1:AllergenTypeCode-BC", label: "Celery"}
              - {value: "gs1:AllergenTypeCode-BM", label: "Mustard"}
              - {value: "gs1:AllergenTypeCode-AS", label: "Sesame seeds"}
              - {value: "gs1:AllergenTypeCode-SULPHUR_DIOXIDE", label: "Sulphur dioxide and sulphites"}
              - {value: "gs1:AllergenTypeCode-NL", label: "Lupin"}
              - {value: "gs1:AllergenTypeCode-UM", label: "Molluscs"}
          - property_id: gs1:allergenLevelOfContainmentCode
            requirement: recommended
            input_type_override: code
            help_text: "Containment level (GS1 LevelOfContainmentCode)."
            options:
              - {value: "gs1:LevelOfContainmentCode-CONTAINS", label: "Contains"}
              - {value: "gs1:LevelOfContainmentCode-FREE_FROM", label: "Free from"}
              - {value: "gs1:LevelOfContainmentCode-MAY_CONTAIN", label: "May contain"}

  - key: certifications
    label: Certifications
    description: Link fields for certification evidence; detailed certification objects remain planned.
    properties:
      - property_id: gs1:certificationInfo
        requirement: recommended
        input_type_override: url
        example_value: "https://example.com/certificates/09501234567890"
        help_text: Certification information URL.
        appears_because: Available link type for certification evidence.
        supported_in_v0_10: true
      - property_id: gs1:certification
        requirement: optional
        input_type_override: object
        object_type: gs1:CertificationDetails
        help_text: "Certification as a nested gs1:CertificationDetails object (safe text/URL/date sub-fields; agency/status code objects remain out of scope)."
        appears_because: "Certifications are modelled as gs1:CertificationDetails in the Web Vocabulary."
        supported_in_v0_10: true
        object_fields:
          - property_id: gs1:certificationStandard
            requirement: recommended
            input_type_override: language_text
            example_value: "EU Organic"
            help_text: "Certification standard name (language-tagged)."
          - property_id: gs1:certificationValue
            requirement: optional
            input_type_override: language_text
            example_value: "Certified"
            help_text: "Certification value (language-tagged)."
          - property_id: gs1:certificationAgency
            requirement: optional
            input_type_override: language_text
            example_value: "Example Certification Agency"
            help_text: "Certifying agency name (language-tagged)."
          - property_id: gs1:certificationIdentification
            requirement: optional
            input_type_override: text
            example_value: "CERT-12345"
            help_text: "Certification identifier."
          - property_id: gs1:certificationURI
            requirement: optional
            input_type_override: url
            example_value: "https://example.com/certificates/09501234567890"
            help_text: "URL to the certification record."
          - property_id: gs1:certificationStartDate
            requirement: optional
            input_type_override: date
            example_value: "2026-01-01"
            help_text: "Certification start date."
          - property_id: gs1:certificationEndDate
            requirement: optional
            input_type_override: date
            example_value: "2027-01-01"
            help_text: "Certification end date."

  - key: documents_dpp
    label: Documents and DPP
    description: DPP and document links that can be emitted as direct URLs in v0.10.
    properties:
      - property_id: gs1:dpp
        requirement: recommended
        input_type_override: url
        example_value: "https://example.com/dpp/09501234567890"
        help_text: Digital Product Passport URL.
        appears_because: Available link type and central future DPP review field.
        supported_in_v0_10: true
      - property_id: gs1:instructions
        requirement: optional
        input_type_override: url
        example_value: "https://example.com/instructions/09501234567890"
        help_text: Instruction document URL.
        appears_because: Safe direct link-type field.
        supported_in_v0_10: true
      - property_id: gs1:referencedFile
        requirement: optional
        input_type_override: object
        object_type: gs1:ReferencedFileDetails
        help_text: "Referenced document/DPP file as a nested gs1:ReferencedFileDetails object."
        appears_because: "Documents are modelled as gs1:ReferencedFileDetails in the Web Vocabulary."
        supported_in_v0_10: true
        object_fields:
          - property_id: gs1:referencedFileURL
            requirement: recommended
            input_type_override: url
            example_value: "https://example.com/document.pdf"
            help_text: "Direct URL of the referenced file."
          - property_id: gs1:fileLanguageCode
            requirement: optional
            input_type_override: text
            example_value: "en"
            help_text: "Language code of the file content."

  - key: other_webvoc_properties
    label: Other Web Vocabulary Properties
    description: Additional safe URL fields useful for prototypes.
    properties:
      - property_id: gs1:jws
        requirement: optional
        input_type_override: url
        example_value: "https://example.com/signatures/09501234567890.jws"
        help_text: JSON Web Signature link.
        appears_because: Useful future bridge to authenticity and VC/DPP review.
        supported_in_v0_10: true
      - property_id: gs1:verificationService
        requirement: optional
        input_type_override: url
        example_value: "https://example.com/verify/09501234567890"
        help_text: Verification service URL.
        appears_because: Lightweight link to external verification information.
        supported_in_v0_10: true


  - key: product_descriptions
    label: Product Descriptions & Marketing
    description: >
      Language-tagged descriptive and marketing fields on the Product that emit as simple langString values.
    properties:
      - property_id: gs1:productDescription
        requirement: optional
        input_type_override: language_text
        example_value: "Example text"
        help_text: "An understandable and useable description of a product using brand and other descriptors"
        appears_because: "Safe rdf:langString Product property available in the Web Vocabulary."
        supported_in_v0_10: true
      - property_id: gs1:functionalName
        requirement: optional
        input_type_override: language_text
        example_value: "Example text"
        help_text: "Describes use of the product or service by the consumer"
        appears_because: "Safe rdf:langString Product property available in the Web Vocabulary."
        supported_in_v0_10: true
      - property_id: gs1:regulatedProductName
        requirement: optional
        input_type_override: language_text
        example_value: "Example text"
        help_text: "The prescribed, regulated or generic product name or denomination that describes the true nature of the product"
        appears_because: "Safe rdf:langString Product property available in the Web Vocabulary."
        supported_in_v0_10: true
      - property_id: gs1:variantDescription
        requirement: optional
        input_type_override: language_text
        example_value: "Example text"
        help_text: "Free text field used to identify the variant of the product"
        appears_because: "Safe rdf:langString Product property available in the Web Vocabulary."
        supported_in_v0_10: true
      - property_id: gs1:productMarketingMessage
        requirement: optional
        input_type_override: language_text
        example_value: "Example text"
        help_text: "Marketing message associated with the product"
        appears_because: "Safe rdf:langString Product property available in the Web Vocabulary."
        supported_in_v0_10: true
      - property_id: gs1:productFeatureBenefit
        requirement: optional
        input_type_override: language_text
        example_value: "Example text"
        help_text: "Element for consumer facing marketing content to describe the key features or benefits of the style suitable for display purposes"
        appears_because: "Safe rdf:langString Product property available in the Web Vocabulary."
        supported_in_v0_10: true
      - property_id: gs1:provenanceStatement
        requirement: optional
        input_type_override: language_text
        example_value: "Example text"
        help_text: "Free text description of the region or place the product originates from"
        appears_because: "Safe rdf:langString Product property available in the Web Vocabulary."
        supported_in_v0_10: true
      - property_id: gs1:countryOfOriginStatement
        requirement: optional
        input_type_override: language_text
        example_value: "Example text"
        help_text: "A description of the geographic area the item may have originated from or has been processed"
        appears_because: "Safe rdf:langString Product property available in the Web Vocabulary."
        supported_in_v0_10: true
      - property_id: gs1:includedAccessories
        requirement: optional
        input_type_override: language_text
        example_value: "Example text"
        help_text: "Any included object or device not part of the core product itself but which adds to its functionality or use"
        appears_because: "Safe rdf:langString Product property available in the Web Vocabulary."
        supported_in_v0_10: true
      - property_id: gs1:descriptiveSize
        requirement: optional
        input_type_override: language_text
        example_value: "Example text"
        help_text: "An alphanumeric size factor the brand owner wishes to communicate to the consumer"
        appears_because: "Safe rdf:langString Product property available in the Web Vocabulary."
        supported_in_v0_10: true
      - property_id: gs1:productRange
        requirement: optional
        input_type_override: language_text
        example_value: "Example text"
        help_text: "A name, used by a Brand Owner, that span multiple consumer categories or uses"
        appears_because: "Safe rdf:langString Product property available in the Web Vocabulary."
        supported_in_v0_10: true
      - property_id: gs1:productFormDescription
        requirement: optional
        input_type_override: language_text
        example_value: "Example text"
        help_text: "The physical form or shape of the product"
        appears_because: "Safe rdf:langString Product property available in the Web Vocabulary."
        supported_in_v0_10: true

  - key: consumer_information
    label: Consumer Information
    description: >
      Consumer-facing instructions, safety and recall fields with simple text, boolean or integer ranges.
    properties:
      - property_id: gs1:consumerUsageInstructions
        requirement: optional
        input_type_override: language_text
        example_value: "Example text"
        help_text: "Free text containing the usage instructions of a product, which are normally held on the label or accompanying the product"
        appears_because: "Safe rdf:langString Product property available in the Web Vocabulary."
        supported_in_v0_10: true
      - property_id: gs1:consumerStorageInstructions
        requirement: optional
        input_type_override: language_text
        example_value: "Example text"
        help_text: "Expresses in text the consumer storage instructions of a product which are normally held on the label or accompanying the product"
        appears_because: "Safe rdf:langString Product property available in the Web Vocabulary."
        supported_in_v0_10: true
      - property_id: gs1:consumerSafetyInformation
        requirement: optional
        input_type_override: language_text
        example_value: "Example text"
        help_text: "Information on consumer safety regarding the product"
        appears_because: "Safe rdf:langString Product property available in the Web Vocabulary."
        supported_in_v0_10: true
      - property_id: gs1:consumerRecyclingInstructions
        requirement: optional
        input_type_override: language_text
        example_value: "Example text"
        help_text: "Expresses in text the consumer recycling instructions which are normally held on the label or accompanying the product"
        appears_because: "Safe rdf:langString Product property available in the Web Vocabulary."
        supported_in_v0_10: true
      - property_id: gs1:consumerPackageDisclaimer
        requirement: optional
        input_type_override: language_text
        example_value: "Example text"
        help_text: "Additional information that should be used in advertising and in displaying"
        appears_because: "Safe rdf:langString Product property available in the Web Vocabulary."
        supported_in_v0_10: true
      - property_id: gs1:warningCopyDescription
        requirement: optional
        input_type_override: language_text
        example_value: "Example text"
